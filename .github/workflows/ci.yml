name: AETHERIX Operational CI Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate-workspace-nodes:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Infrastructure
      uses: actions/checkout@v4

    - name: Initialize Testing Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Using flat string execution blocks to prevent structural indentation errors
    - name: Run Core Path Audits
      run: python -c "import os, sys; assets = ['index.html', 'style.css', 'app.js', 'manifest.json']; [sys.exit(1) for n in assets if not os.path.exists(n)]; print('✅ Success: All serverless assets verified.')"
