name: AETHERIX Operational CI Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate-workspace-nodes:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Infrastructure
      uses: actions/checkout@v4

    - name: Initialize Isolated Environment Runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run Core Path Audits
      run: |
        echo "🚀 Auditing AETHERIX layout dependencies..."
        python -c "
        import os, sys
        assets = ['index.html', 'style.css', 'app.js', 'manifest.json']
        for node in assets:
            if not os.path.exists(node):
                print(f'⚠️ Node alignment missing: {node}'); sys.exit(1)
        print('✅ All serverless assets verified successfully.')
        "
